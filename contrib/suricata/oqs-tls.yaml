# OQS Scanner — Suricata TLS extended logging configuration
#
# Drop this snippet into your suricata.yaml under outputs > eve-log > types > tls
# to enable the custom fields that oqs-scanner's suricata-log engine can consume.
#
# Example suricata.yaml integration:
#
#   outputs:
#     - eve-log:
#         enabled: yes
#         filetype: regular
#         filename: /var/log/suricata/eve.json
#         types:
#           - tls:
#               <<: *oqs-tls-config   # or paste the block below directly
#
# Supported from Suricata 7.x. Some fields (sigalgs, groups) require a Suricata
# build with the extended TLS logging patch — check your build with:
#   suricata --build-info | grep -i tls

tls:
  extended: yes               # Enables version, cipher, SNI, subject, issuerdn, serial, fingerprint, notbefore, notafter
  session-resumption: yes     # Log resumed sessions (important for hybrid KEM tracking)
  custom:
    - serial
    - not_before
    - not_after
    - sni
    - subject
    - issuer
    - version
    - cipher
    - chain                   # Full certificate chain (subject/issuerdn/serial/fingerprint per link)
    - ja3                     # JA3 client fingerprint
    - ja3s                    # JA3S server fingerprint (used by oqs-scanner for PQC hint lookup)
    # The following fields require Suricata built with extended TLS logging support.
    # They are NOT available in vanilla Suricata 7.x — verify with your build's
    # release notes before enabling. oqs-scanner silently skips absent fields.
    - sigalgs                 # Comma-separated TLS signature algorithms from ClientHello
    - groups                  # Comma-separated TLS supported groups / key_share groups
