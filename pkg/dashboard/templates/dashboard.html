<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'; connect-src 'self'; img-src data:;">
<title>OQS Scanner — Quantum Security Dashboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050508;--surface:#0c0c10;--card:#101016;--card-border:#1a1a24;
  --card-hover:#14141e;--text:#e2e2ea;--muted:#6b6b80;--dim:#3a3a50;
  --accent:#6366f1;--accent-glow:rgba(99,102,241,.15);
  --red:#ef4444;--orange:#f97316;--amber:#eab308;--green:#22c55e;--blue:#3b82f6;--cyan:#06b6d4;
  --red-bg:rgba(239,68,68,.08);--green-bg:rgba(34,197,94,.08);--amber-bg:rgba(234,179,8,.08);
  --radius:14px;--transition:.2s cubic-bezier(.4,0,.2,1);
}
@font-face{font-family:'DM';src:local('DM Sans'),local('system-ui');font-display:swap}
body{background:var(--bg);color:var(--text);font-family:'DM',system-ui,-apple-system,sans-serif;font-size:13.5px;line-height:1.55;display:flex;height:100vh;overflow:hidden}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:3px}

/* ── Sidebar ─────────────────────────────────────────────── */
#sidebar{width:250px;min-width:250px;background:var(--surface);border-right:1px solid var(--card-border);display:flex;flex-direction:column;z-index:10;height:100vh;overflow:hidden}
#sidebar-header{padding:20px 18px 16px;border-bottom:1px solid var(--card-border)}
#sidebar-header h1{font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--accent)}
#sidebar-header p{font-size:10.5px;color:var(--dim);margin-top:5px;letter-spacing:.3px}
#project-list{flex:1;overflow-y:auto;padding:6px 0}
.proj-item{display:flex;align-items:center;justify-content:space-between;padding:10px 18px;cursor:pointer;border-left:2px solid transparent;transition:all var(--transition)}
.proj-item:hover{background:rgba(255,255,255,.025)}
.proj-item.active{background:var(--accent-glow);border-left-color:var(--accent)}
.proj-name{font-size:12.5px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:150px}
.proj-score{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;flex-shrink:0;backdrop-filter:blur(4px)}
#no-projects{padding:32px 18px;color:var(--dim);font-size:12px;text-align:center;line-height:1.6}

/* ── Main Area ───────────────────────────────────────────── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{padding:16px 28px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(12px);background:rgba(5,5,8,.85)}
#project-title{font-size:15px;font-weight:600;letter-spacing:.2px}
#project-subtitle{font-size:11px;color:var(--dim);margin-top:2px}
#topbar-actions{display:flex;gap:8px;align-items:center}
.action-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--card-border);background:var(--card);color:var(--text);font-size:11px;font-weight:600;cursor:pointer;transition:all var(--transition);display:flex;align-items:center;gap:5px;letter-spacing:.3px}
.action-btn:hover{border-color:var(--accent);background:var(--accent-glow);transform:translateY(-1px)}
.action-btn .btn-icon{font-size:13px}
#content{flex:1;overflow-y:auto;padding:24px 28px;scroll-behavior:smooth}

/* ── Cards & Sections ────────────────────────────────────── */
.grid{display:grid;gap:16px;margin-bottom:20px}
.grid-5{grid-template-columns:repeat(5,1fr)}
.grid-2{grid-template-columns:1fr 1fr}
.grid-2-1{grid-template-columns:2fr 1fr}
.grid-1-2{grid-template-columns:1fr 2fr}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:18px;transition:all var(--transition);position:relative;overflow:hidden}
.card:hover{border-color:#2a2a3a;transform:translateY(-1px)}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(99,102,241,.04),transparent 60%);pointer-events:none;border-radius:var(--radius)}
.card-label{font-size:10px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px}
.card-value{font-size:32px;font-weight:800;letter-spacing:-.5px;line-height:1}
.card-sub{font-size:11px;color:var(--muted);margin-top:8px;display:flex;align-items:center;gap:4px}
.section{background:var(--card);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px;margin-bottom:20px;position:relative;overflow:hidden}
.section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-glow),transparent);pointer-events:none}
.section-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.section-title::before{content:'';width:3px;height:12px;background:var(--accent);border-radius:2px}

/* ── Grade & Score ───────────────────────────────────────── */
.grade{display:inline-flex;width:44px;height:44px;border-radius:10px;align-items:center;justify-content:center;font-weight:800;font-size:18px;letter-spacing:-.5px}

/* ── Deltas ──────────────────────────────────────────────── */
.dlt{font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.dlt-up{color:var(--green)}.dlt-dn{color:var(--red)}.dlt-neu{color:var(--dim)}

/* ── Chart ───────────────────────────────────────────────── */
.chart-wrap{overflow:hidden;width:100%;min-height:160px}
svg.chart{width:100%;overflow:visible}
.c-grid{stroke:var(--card-border);stroke-width:1;stroke-dasharray:3,6}
.c-line{fill:none;stroke:var(--accent);stroke-width:2.5;stroke-linejoin:round;stroke-linecap:round;filter:drop-shadow(0 0 6px rgba(99,102,241,.4))}
.c-area{opacity:.15}
.c-dot{fill:var(--accent);stroke:var(--bg);stroke-width:2.5;cursor:pointer;transition:r .15s}
.c-dot:hover{r:6}
.c-lbl{fill:var(--dim);font-size:10px;font-family:inherit}
.c-val{fill:var(--text);font-size:10px;font-weight:700;font-family:inherit}
.c-tooltip{position:absolute;background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:8px 12px;font-size:11px;pointer-events:none;opacity:0;transition:opacity .15s;z-index:5;box-shadow:0 8px 24px rgba(0,0,0,.5)}

/* ── Donut Chart ─────────────────────────────────────────── */
.donut-wrap{position:relative;width:200px;height:200px;margin:0 auto}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-val{font-size:28px;font-weight:800;line-height:1}
.donut-center-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.donut-seg{cursor:pointer;transition:opacity .15s,transform .15s;transform-origin:center}
.donut-seg:hover{opacity:.75;transform:scale(1.03)}
.donut-legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:16px;justify-content:center}
.donut-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;cursor:pointer;transition:opacity .15s}
.donut-legend-item:hover{opacity:.7}
.donut-legend-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* ── HNDL Panel ──────────────────────────────────────────── */
.hndl-card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:24px 18px}
.hndl-count{font-size:40px;font-weight:800;line-height:1}
.hndl-label{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.4}
.hndl-bar{width:100%;height:6px;background:rgba(255,255,255,.06);border-radius:3px;margin-top:12px;overflow:hidden}
.hndl-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.hndl-deadline{font-size:10px;color:var(--dim);margin-top:8px;font-variant-numeric:tabular-nums}

/* ── Effort Cards ────────────────────────────────────────── */
.effort-card{text-align:center;padding:20px 16px}
.effort-count{font-size:36px;font-weight:800;line-height:1}
.effort-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:8px}
.effort-est{font-size:11px;color:var(--dim);margin-top:6px}

/* ── Compliance ──────────────────────────────────────────── */
.compliance-badge{display:flex;align-items:center;gap:12px;padding:16px 20px;border-radius:10px;margin-bottom:16px}
.compliance-badge.pass{background:var(--green-bg);border:1px solid rgba(34,197,94,.2)}
.compliance-badge.fail{background:var(--red-bg);border:1px solid rgba(239,68,68,.2)}
.compliance-icon{font-size:28px}
.compliance-text{font-size:14px;font-weight:700}
.compliance-check{display:flex;align-items:center;gap:8px;padding:7px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.04)}
.compliance-check:last-child{border-bottom:none}
.check-mark{width:18px;text-align:center;font-size:13px}

/* ── Scan Diff ───────────────────────────────────────────── */
.diff-badges{display:flex;gap:12px;flex-wrap:wrap}
.diff-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06)}
.diff-badge.good{border-color:rgba(34,197,94,.2);color:var(--green)}
.diff-badge.bad{border-color:rgba(239,68,68,.2);color:var(--red)}
.diff-badge.neutral{color:var(--dim)}

/* ── Severity Heat Bar ───────────────────────────────────── */
.heat-bar{display:flex;height:32px;border-radius:6px;overflow:hidden;margin-bottom:8px}
.heat-seg{transition:width .6s;min-width:2px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,.9);cursor:pointer}
.heat-seg:hover{filter:brightness(1.2)}
.heat-legend{display:flex;gap:16px;margin-top:8px}
.heat-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.heat-legend-dot{width:8px;height:8px;border-radius:2px}

/* ── Table ───────────────────────────────────────────────── */
table{width:100%;border-collapse:collapse;font-size:12.5px;table-layout:auto}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
th{text-align:left;padding:8px 10px;color:var(--dim);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--card-border);cursor:pointer;user-select:none;transition:color .15s}
th:hover{color:var(--text)}
th.sort-asc::after{content:' ▲';color:var(--accent);font-size:8px}
th.sort-desc::after{content:' ▼';color:var(--accent);font-size:8px}
td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
tr:hover td{background:rgba(99,102,241,.04)}
.cat-row{cursor:pointer}
.cat-row td{font-weight:600;background:rgba(255,255,255,.02)}
.cat-row:hover td{background:rgba(255,255,255,.05)}
.cat-chevron{display:inline-block;transition:transform .2s;margin-right:6px;font-size:10px;color:var(--dim)}
.cat-expanded .cat-chevron{transform:rotate(90deg)}
.cat-detail{display:none}
.cat-expanded+.cat-detail{display:table-row}

/* ── States ──────────────────────────────────────────────── */
#empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:14px;color:var(--muted);text-align:center}
#empty-state h2{font-size:16px;color:var(--text);font-weight:600}
#loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--dim);font-size:13px;gap:10px}
.spinner{width:16px;height:16px;border:2px solid var(--card-border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeIn .35s ease-out both}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}

/* ── Mobile ──────────────────────────────────────────────── */
@media(max-width:768px){
  body{flex-direction:column}
  #sidebar{width:100%;min-width:0;max-height:140px;border-right:none;border-bottom:1px solid var(--card-border)}
  #project-list{display:flex;overflow-x:auto;padding:4px 8px}
  .proj-item{min-width:140px;flex-shrink:0;border-left:none;border-bottom:2px solid transparent}
  .proj-item.active{border-bottom-color:var(--accent);border-left:none}
  .grid-5{grid-template-columns:repeat(3,1fr)}
  .grid-2,.grid-2-1,.grid-1-2{grid-template-columns:1fr}
  #content{padding:16px}
}
@media(max-width:480px){.grid-5{grid-template-columns:repeat(2,1fr)}}
@media print{
  body{background:#fff;color:#111}
  .card,.section{border:1px solid #ddd;background:#fafafa;box-shadow:none}
  .card::before,.section::before{display:none}
  #sidebar{display:none}
  #topbar{border-bottom:2px solid #111}
}
</style>
</head>
<body>

<nav id="sidebar">
  <div id="sidebar-header">
    <h1>OQS Scanner</h1>
    <p>Quantum Security Dashboard</p>
  </div>
  <div id="project-list"><div id="no-projects">Loading&#8230;</div></div>
</nav>

<div id="main">
  <div id="topbar">
    <div>
      <div id="project-title" style="color:var(--dim)">Select a project</div>
      <div id="project-subtitle"></div>
    </div>
    <div id="topbar-actions" style="display:none">
      <button class="action-btn" id="btn-cbom" title="Export scan history as JSON"><span class="btn-icon">&#x1F4E6;</span> Export</button>
      <button class="action-btn" id="btn-json" title="Download scan results as JSON"><span class="btn-icon">&#x1F4CB;</span> JSON</button>
    </div>
  </div>
  <div id="content">
    <div id="empty-state">
      <div style="font-size:40px;opacity:.4">&#x1F6E1;</div>
      <h2>No project selected</h2>
      <p style="max-width:300px;line-height:1.5">Choose a project from the sidebar to view its quantum security posture.</p>
    </div>
  </div>
</div>

<script>
(function(){"use strict";

/* ── Utilities ────────────────────────────────────────────── */
function esc(s){return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function gradeColor(g){if(!g)return"var(--dim)";var c=g[0];return c==="A"?"var(--green)":c==="B"?"var(--blue)":c==="C"?"var(--amber)":c==="D"?"var(--orange)":"var(--red)"}
function scoreColor(s){return s>=80?"var(--green)":s>=60?"var(--blue)":s>=40?"var(--amber)":s>=20?"var(--orange)":"var(--red)"}
function scoreHex(s){return s>=80?"#22c55e":s>=60?"#3b82f6":s>=40?"#eab308":s>=20?"#f97316":"#ef4444"}
function fmtDate(ts){if(!ts)return"\u2014";try{var d=new Date(ts);return d.toLocaleDateString(undefined,{year:"numeric",month:"2-digit",day:"2-digit"})+" "+d.toLocaleTimeString(undefined,{hour:"2-digit",minute:"2-digit"})}catch(e){return String(ts).slice(0,16)}}
function delta(n,inv){if(n==null||n===0)return'<span class="dlt dlt-neu">\u2014</span>';var g=inv?(n<0):(n>0);return'<span class="dlt '+(g?"dlt-up":"dlt-dn")+'">'+(n>0?"+":"")+n+'</span>'}
async function api(url){var r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);return r.json()}
function downloadAs(url,filename,label){
  fetch(url).then(function(r){return r.blob()}).then(function(b){
    var a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=filename;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
  }).catch(function(e){alert("Download failed: "+e.message)});
}

/* ── Project list ─────────────────────────────────────────── */
async function boot(){
  var list=document.getElementById("project-list");
  try{
    var projects=await api("/api/projects");
    list.textContent="";
    if(!projects||!projects.length){list.innerHTML='<div id="no-projects">No scans yet.<br>Run <code>oqs-scanner scan</code> to get started.</div>';return}
    projects.forEach(function(p){
      var el=document.createElement("div");el.className="proj-item";el.dataset.slug=p.slug;
      var n=document.createElement("span");n.className="proj-name";n.title=p.name||"";n.textContent=p.name||p.slug;
      var s=document.createElement("span");s.className="proj-score";
      if(p.latestQRS!=null){var h=scoreHex(p.latestQRS);s.style.cssText="background:"+h+"18;color:"+h;s.textContent=p.latestQRS}
      else{s.style.color="var(--dim)";s.textContent="\u2014"}
      el.appendChild(n);el.appendChild(s);
      el.addEventListener("click",function(){selectProject(p.slug,p.name||p.slug)});
      list.appendChild(el)
    });
    selectProject(projects[0].slug,projects[0].name||projects[0].slug)
  }catch(e){list.innerHTML='<div id="no-projects" style="color:var(--red)">Failed to load</div>'}
}

function setActive(slug){document.querySelectorAll(".proj-item").forEach(function(el){el.classList.toggle("active",el.dataset.slug===slug)})}

/* ── Load project ─────────────────────────────────────────── */
async function selectProject(slug,name){
  setActive(slug);
  document.getElementById("project-title").textContent=name;
  document.getElementById("project-title").style.color="";
  document.getElementById("project-subtitle").textContent="";
  var ct=document.getElementById("content");
  ct.scrollTop=0;
  ct.innerHTML='<div id="loading"><div class="spinner"></div>Loading\u2026</div>';
  try{
    var enc=encodeURIComponent(slug);
    var res=await Promise.all([api("/api/projects/"+enc+"/history"),api("/api/projects/"+enc+"/trends"),api("/api/projects/"+enc+"/findings")]);
    // Show action buttons
    var actions=document.getElementById("topbar-actions");
    actions.style.display="flex";
    document.getElementById("btn-cbom").onclick=function(){downloadAs("/api/projects/"+enc+"/history",slug+"-history.json","History")};
    document.getElementById("btn-json").onclick=function(){downloadAs("/api/projects/"+enc+"/history",slug+"-scan.json","JSON")};
    render(name,res[0],res[1],res[2],ct)
  }catch(e){ct.innerHTML='<div id="empty-state"><div style="font-size:32px">&#x26A0;</div><h2>Error</h2><p>'+esc(e.message)+'</p></div>'}
}

/* ── Main render ──────────────────────────────────────────── */
function render(name,history,trends,findingsData,ct){
  ct.textContent="";
  if(!history||!history.length){ct.innerHTML='<div id="empty-state"><div style="font-size:32px;opacity:.4">&#x1F4CB;</div><h2>No scans yet</h2><p>Run <code style="background:var(--card);padding:2px 6px;border-radius:4px">oqs-scanner scan</code></p></div>';return}
  var latest=history[history.length-1];
  var prev=history.length>=2?history[history.length-2]:null;
  if(latest.branch)document.getElementById("project-subtitle").textContent="branch: "+latest.branch+" \u00b7 "+history.length+" scan"+(history.length>1?"s":"");
  var d=(trends&&trends.delta)||{};
  var fs=latest.findingSummary||{};

  // KPI row
  var kpi=mk("div","grid grid-5 animate-in d1");ct.appendChild(kpi);
  renderKPI(kpi,latest,d,history.length);

  // Trend chart
  var chart=mk("div","animate-in d2");ct.appendChild(chart);
  renderChart(chart,trends);

  // HNDL + Compliance row
  var row1=mk("div","grid grid-2 animate-in d3");ct.appendChild(row1);
  renderHNDL(row1,fs,findingsData);
  renderCompliance(row1,latest);

  // Donut + Effort row
  var row2=mk("div","grid grid-2 animate-in d4");ct.appendChild(row2);
  renderDonut(row2,fs);
  renderEffort(row2,fs,findingsData);

  // Scan diff + Heat bar row
  var row3=mk("div","grid grid-2 animate-in d5");ct.appendChild(row3);
  renderDiff(row3,latest,prev,d);
  renderHeatBar(row3,fs);

  // Recent scans table
  var tbl=mk("div","animate-in d6");ct.appendChild(tbl);
  renderTable(tbl,history);

  // Finding breakdown
  var brk=mk("div","animate-in d7");ct.appendChild(brk);
  renderBreakdown(brk,fs);

  // Findings drill-down table (from stored TopFindings)
  var fdiv=mk("div","animate-in d8");ct.appendChild(fdiv);
  if(findingsData&&findingsData.length>0){
    renderFindingsTable(fdiv,findingsData);
  } else {
    fdiv.innerHTML='<div class="section"><div class="section-title">Finding Details</div><p style="color:var(--dim);font-size:12px">No finding details stored. Re-run <code style="background:var(--bg);padding:2px 6px;border-radius:4px">oqs-scanner scan</code> to capture findings.</p></div>';
  }
}

function mk(tag,cls){var e=document.createElement(tag);if(cls)e.className=cls;return e}

/* ── 0. KPI Cards ─────────────────────────────────────────── */
function renderKPI(el,latest,d,count){
  var qrs=latest.quantumReadinessScore||0,grade=latest.quantumReadinessGrade||"\u2014",fs=latest.findingSummary||{};
  var vuln=(fs.quantumVulnerable||0),dep=(fs.deprecated||0);
  el.innerHTML=
    '<div class="card"><div class="card-label">QRS Score</div><div class="card-value" style="color:'+scoreHex(qrs)+'">'+qrs+'</div><div class="card-sub">'+delta(d.qrs,false)+' from first scan</div></div>'+
    '<div class="card"><div class="card-label">Grade</div><div class="card-value"><span class="grade" style="background:'+scoreHex(qrs)+'18;color:'+scoreHex(qrs)+'">'+esc(grade)+'</span></div><div class="card-sub">/100 scale</div></div>'+
    '<div class="card"><div class="card-label">Findings</div><div class="card-value">'+(fs.total||0)+'</div><div class="card-sub">'+delta(d.findings,true)+'</div></div>'+

/* ── 1. Trend Chart ───────────────────────────────────────── */
function renderChart(el,trends){
  if(!trends||!trends.dataPoints||trends.dataPoints.length<2){el.innerHTML='<div class="section"><div class="section-title">QRS Trend</div><p style="color:var(--dim);font-size:12px">Need 2+ scans for trend.</p></div>';return}
  var pts=trends.dataPoints,W=700,H=170,pl=44,pr=20,pt=20,pb=32,iw=W-pl-pr,ih=H-pt-pb;
  var scores=pts.map(function(p){return p.qrs||0}),mn=Math.max(0,Math.min.apply(null,scores)-10),mx=Math.min(100,Math.max.apply(null,scores)+10),rng=mx-mn||1;
  function cx(i){return pl+i/(pts.length-1)*iw}function cy(s){return pt+ih-((s-mn)/rng*ih)}
  var grid="",axis="";
  [0,25,50,75,100].forEach(function(v){if(v<mn-5||v>mx+5)return;var y=cy(v);grid+='<line class="c-grid" x1="'+pl+'" y1="'+y.toFixed(1)+'" x2="'+(W-pr)+'" y2="'+y.toFixed(1)+'"/>';axis+='<text class="c-lbl" x="'+(pl-6)+'" y="'+(y+3.5).toFixed(1)+'" text-anchor="end">'+v+'</text>'});
  var pathD=pts.map(function(p,i){return(i?'L':'M')+cx(i).toFixed(1)+','+cy(p.qrs||0).toFixed(1)}).join(' ');
  var areaD=pathD+' L'+cx(pts.length-1).toFixed(1)+','+(pt+ih)+' L'+pl+','+(pt+ih)+' Z';
  var dots="",vals="";
  pts.forEach(function(p,i){var x=cx(i),y=cy(p.qrs||0);dots+='<circle class="c-dot" cx="'+x.toFixed(1)+'" cy="'+y.toFixed(1)+'" r="4" data-idx="'+i+'"/>';if(i===0||i===pts.length-1||pts.length<=10)vals+='<text class="c-val" x="'+x.toFixed(1)+'" y="'+(y-10).toFixed(1)+'" text-anchor="'+(i===0?'start':i===pts.length-1?'end':'middle')+'">'+(p.qrs||0)+'</text>'});
  var xlbl="";var step=Math.max(1,Math.floor(pts.length/7));
  pts.forEach(function(p,i){if(i%step!==0&&i!==pts.length-1)return;xlbl+='<text class="c-lbl" x="'+cx(i).toFixed(1)+'" y="'+(pt+ih+20)+'" text-anchor="middle">'+esc((p.date||"").slice(5))+'</text>'});
  el.innerHTML='<div class="section"><div class="section-title">QRS Score Over Time</div><div class="chart-wrap"><svg class="chart" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#6366f1" stop-opacity=".2"/><stop offset="100%" stop-color="#6366f1" stop-opacity=".01"/></linearGradient></defs>'+grid+axis+'<path d="'+areaD+'" fill="url(#ag)" class="c-area"/><path class="c-line" d="'+pathD+'"/>'+dots+vals+xlbl+'</svg></div>'+(trends.summary?'<div style="font-size:11px;color:var(--muted);margin-top:10px">'+esc(trends.summary)+'</div>':'')+'</div>'
}

/* ── 2. Donut Chart ───────────────────────────────────────── */
function renderDonut(el,fs){
  var sec=mk("div","section");el.appendChild(sec);
  sec.innerHTML='<div class="section-title">Algorithm Inventory</div>';
  var data=[{label:"Vulnerable",val:fs.quantumVulnerable||0,color:"#ef4444"},{label:"Weakened",val:fs.quantumWeakened||0,color:"#f97316"},{label:"Safe",val:fs.quantumSafe||0,color:"#22c55e"},{label:"Resistant",val:fs.quantumResistant||0,color:"#3b82f6"},{label:"Deprecated",val:fs.deprecated||0,color:"#6b6b80"}];
  var total=data.reduce(function(a,d){return a+d.val},0);
  if(!total){sec.innerHTML+='<p style="color:var(--dim);font-size:12px;text-align:center">No findings</p>';return}
  var wrap=mk("div","donut-wrap");sec.appendChild(wrap);
  var R=90,r=62,cx=100,cy=100;
  var svg='<svg width="200" height="200" viewBox="0 0 200 200">';
  var angle=-90;
  data.forEach(function(d){
    if(!d.val)return;
    var pct=d.val/total,deg=pct*360,rad1=angle*Math.PI/180,rad2=(angle+deg)*Math.PI/180;
    var large=deg>180?1:0;
    var x1=cx+R*Math.cos(rad1),y1=cy+R*Math.sin(rad1),x2=cx+R*Math.cos(rad2),y2=cy+R*Math.sin(rad2);
    var ix1=cx+r*Math.cos(rad1),iy1=cy+r*Math.sin(rad1),ix2=cx+r*Math.cos(rad2),iy2=cy+r*Math.sin(rad2);
    svg+='<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+R+','+R+' 0 '+large+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' L'+ix2.toFixed(1)+','+iy2.toFixed(1)+' A'+r+','+r+' 0 '+large+',0 '+ix1.toFixed(1)+','+iy1.toFixed(1)+' Z" fill="'+d.color+'" class="donut-seg"><title>'+esc(d.label)+': '+d.val+' ('+(pct*100).toFixed(1)+'%)</title></path>';
    angle+=deg
  });
  svg+='</svg>';
  wrap.innerHTML=svg+'<div class="donut-center"><div class="donut-center-val">'+total+'</div><div class="donut-center-lbl">Total</div></div>';
  var leg=mk("div","donut-legend");sec.appendChild(leg);
  data.forEach(function(d){if(!d.val)return;leg.innerHTML+='<div class="donut-legend-item"><div class="donut-legend-swatch" style="background:'+d.color+'"></div>'+esc(d.label)+' <span style="font-weight:700">'+d.val+'</span></div>'})
}

/* ── 3. HNDL Urgency Panel ────────────────────────────────── */
function renderHNDL(el,fs,findingsData){

/* ── 4. Migration Effort ──────────────────────────────────── */
function renderEffort(el,fs,findingsData){
  var simple=0,moderate=0,complex=0;
  if(findingsData&&findingsData.length>0){
    findingsData.forEach(function(f){

      else if(f.migrationEffort==="complex")complex++;
    });
  } else {
    simple=fs.low||0;moderate=fs.medium||0;complex=fs.high||0;
  }
  var weeks=((simple*.5+moderate*2+complex*5)/5).toFixed(1);
  var sec=mk("div","section");el.appendChild(sec);
  sec.innerHTML='<div class="section-title">Migration Effort</div>'+
    '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px">'+
      '<div class="card effort-card" style="border-color:rgba(34,197,94,.15)"><div class="effort-count" style="color:var(--green)">'+simple+'</div><div class="effort-label">Simple</div><div class="effort-est">~0.5d each</div></div>'+

        detailContent+='<div style="margin-bottom:8px">'+esc(f.recommendation)+'</div>';
      }
      if(f.migrationSnippet && (f.migrationSnippet.before || f.migrationSnippet.after)){
        var s=f.migrationSnippet;
        detailContent+='<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--card-border)">';
        detailContent+='<div style="font-size:11px;font-weight:600;color:var(--cyan);margin-bottom:6px">\u21C4 Migration: '+esc(s.language)+' \u2014 '+esc(s.explanation)+'</div>';
        detailContent+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
        detailContent+='<div><div style="font-size:10px;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">Before</div><pre style="background:var(--bg);padding:8px 10px;border-radius:6px;font-size:11px;overflow-x:auto;color:var(--muted);border:1px solid var(--card-border);white-space:pre;overflow-x:auto">'+esc(s.before)+'</pre></div>';
        detailContent+='<div><div style="font-size:10px;color:var(--green);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px">After</div><pre style="background:rgba(34,197,94,.05);padding:8px 10px;border-radius:6px;font-size:11px;overflow-x:auto;color:var(--green);border:1px solid rgba(34,197,94,.15);white-space:pre;overflow-x:auto">'+esc(s.after)+'</pre></div>';
        detailContent+='</div></div>';
      }
      html+='<tr class="finding-detail" style="display:none" data-parent="'+i+'"><td colspan="9" style="padding:10px 16px 14px 32px;background:rgba(99,102,241,.03);font-size:12px;color:var(--muted);line-height:1.6;border-left:2px solid var(--accent)">'+detailContent+'</td></tr>';
    }
  });
  html+='</tbody></table></div>';
  // Pagination info
  html+='<div style="margin-top:10px;font-size:11px;color:var(--dim);text-align:center">Showing '+findings.length+' findings (max '+100+')</div>';
  sec.innerHTML+=html;
  attachSort(document.getElementById("findings-tbl"));
}
// Toggle finding detail row
function toggleFindingDetail(row){
  var idx=row.dataset.idx;
  var detail=document.querySelector('.finding-detail[data-parent="'+idx+'"]');
  if(detail)detail.style.display=detail.style.display==='none'?'table-row':'none';
}
// Filter findings table
function filterFindings(query){
  var q=query.toLowerCase();
  var rows=document.querySelectorAll('#findings-tbl .finding-row');
  rows.forEach(function(row){
    var text=row.textContent.toLowerCase();
    row.style.display=text.includes(q)?'':'none';
    // Also hide detail rows when filtering
    var idx=row.dataset.idx;
    var detail=document.querySelector('.finding-detail[data-parent="'+idx+'"]');
    if(detail&&!text.includes(q))detail.style.display='none';
  });
}

/* ── Table Sort ────────────────────────────────────────────── */
function attachSort(tblEl){
  if(!tblEl)return;
  var state={col:-1,dir:1};
  tblEl.querySelectorAll("thead th").forEach(function(th,i){
    th.addEventListener("click",function(){
      state.dir=state.col===i?-state.dir:1;state.col=i;
      tblEl.querySelectorAll("thead th").forEach(function(t){t.classList.remove("sort-asc","sort-desc")});
      th.classList.add(state.dir===1?"sort-asc":"sort-desc");
      var tbody=tblEl.querySelector("tbody");
      var rows=Array.from(tbody.querySelectorAll("tr:not(.cat-detail):not(.finding-detail)"));
      rows.sort(function(a,b){
        var av=a.cells[i]?a.cells[i].getAttribute("data-sort")||a.cells[i].textContent.trim():"";
        var bv=b.cells[i]?b.cells[i].getAttribute("data-sort")||b.cells[i].textContent.trim():"";
        var an=parseFloat(av),bn=parseFloat(bv);
        return(!isNaN(an)&&!isNaN(bn)?an-bn:av.localeCompare(bv))*state.dir;
      });
      rows.forEach(function(r){
        tbody.appendChild(r);
        var detail=tbody.querySelector('.finding-detail[data-parent="'+r.dataset.idx+'"]');
        if(detail) tbody.appendChild(detail);
      });
    });
  });
}

/* ── Boot ──────────────────────────────────────────────────── */
window.filterFindings=filterFindings;
window.toggleFindingDetail=toggleFindingDetail;
boot()
})();
</script>
